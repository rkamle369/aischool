name: Build and Push Images to ACR

on:
  push:
    paths:
      - "aiagents-frontend/**"
      - "frontend/**"
      - "backend/**"
      - "livekit-agent/**"
      - ".github/workflows/build-and-push-acr.yml"
  workflow_dispatch:
    inputs:
      build_aiagents_frontend:
        description: "Build aiagents-frontend image"
        required: false
        default: false
        type: boolean
      build_frontend:
        description: "Build frontend image"
        required: false
        default: false
        type: boolean
      build_backend:
        description: "Build backend image"
        required: false
        default: false
        type: boolean
      build_livekit_agent:
        description: "Build livekit-agent image"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      aiagents_frontend: ${{ steps.filter.outputs.aiagents_frontend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      livekit_agent: ${{ steps.filter.outputs.livekit_agent }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed folders
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            aiagents_frontend:
              - 'aiagents-frontend/**'
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            livekit_agent:
              - 'livekit-agent/**'

  build-aiagents-frontend:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.aiagents_frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_aiagents_frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/aiagents-frontend
          tags: |
            type=raw,value=${{ github.run_id }}

      - name: Build and push aiagents-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./aiagents-frontend
          file: ./aiagents-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/frontend
          tags: |
            type=raw,value=${{ github.run_id }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-backend:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.backend == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_backend == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/backend
          tags: |
            type=raw,value=${{ github.run_id }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-livekit-agent:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.livekit_agent == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_livekit_agent == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/livekit-agent
          tags: |
            type=raw,value=${{ github.run_id }}

      - name: Build and push livekit-agent
        uses: docker/build-push-action@v6
        with:
          context: ./livekit-agent
          file: ./livekit-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
